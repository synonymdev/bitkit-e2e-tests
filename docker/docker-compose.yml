services:
  bitcoind:
    container_name: bitcoin
    image: btcpayserver/bitcoin:26.0
    restart: unless-stopped
    expose:
      - '43782'
      - '39388'
    ports:
      - '43782:43782'
      - '39388:39388'
    volumes:
      - 'bitcoin_home:/home/bitcoin/.bitcoin'
    environment:
      BITCOIN_NETWORK: ${NBITCOIN_NETWORK:-regtest}
      CREATE_WALLET: 'true'
      BITCOIN_WALLETDIR: '/walletdata'
      BITCOIN_EXTRA_ARGS: |
        rpcport=43782
        rpcbind=0.0.0.0:43782
        rpcallowip=0.0.0.0/0
        port=39388
        whitelist=0.0.0.0/0
        maxmempool=500
        rpcauth=polaruser:5e5e98c21f5c814568f8b55d83b23c1c$$066b03f92df30b11de8e4b1b1cd5b1b4281aa25205bd57df9be82caf97a05526
        txindex=1
        fallbackfee=0.00001
        zmqpubrawblock=tcp://0.0.0.0:28334
        zmqpubrawtx=tcp://0.0.0.0:28335
        zmqpubhashblock=tcp://0.0.0.0:28336

  bitcoinsetup:
    image: btcpayserver/bitcoin:26.0
    depends_on:
      - bitcoind
    restart: 'no'
    volumes:
      - 'bitcoin_home:/home/bitcoin/.bitcoin'
    user: bitcoin
    # generate one block so electrs stop complaining
    entrypoint:
      [
        'bash',
        '-c',
        'sleep 1; while ! bitcoin-cli -rpcconnect=bitcoind -generate 1; do sleep 1; done',
      ]

  electrs:
    container_name: electrum
    image: getumbrel/electrs:v0.10.2
    restart: unless-stopped
    depends_on:
      - bitcoind
    expose:
      - '60001'
      - '28334'
      - '28335'
      - '28336'
    ports:
      - '60001:60001'
      # - '28334:28334'
      # - '28335:28335'
      # - '28336:28336'
    volumes:
      - './electrs.toml:/data/electrs.toml'
    environment:
      - ELECTRS_NETWORK=regtest
      - ELECTRS_ELECTRUM_RPC_ADDR=electrs:60001
      - ELECTRS_DAEMON_RPC_ADDR=bitcoind:43782
      - ELECTRS_DAEMON_P2P_ADDR=bitcoind:39388
      - ELECTRS_LOG_FILTERS=INFO

  darkhttpd:
    image: p3terx/darkhttpd:1.16
    restart: unless-stopped
    depends_on:
      - bitcoinsetup
    expose:
      - '80'
    ports:
      - '80:80'
    volumes:
      - './btc-fee-estimates.json:/www/btc-fee-estimates.json'
    command:
      - '/www'

  lnd:
    container_name: lnd
    image: polarlightning/lnd:0.18.0-beta
    restart: unless-stopped
    depends_on:
      - bitcoind
    expose:
      - '8080' # REST
      - '9735' # P2P
      - '10009' # RPC
    ports:
      - '8080:8080'
      - '9735:9735'
      - '10009:10009'
    volumes:
      - './lnd:/home/lnd/.lnd/'
    command:
      - '--noseedbackup'
      - '--alias=lnd'
      - '--externalip=127.0.0.1'
      - '--bitcoin.active'
      - '--bitcoin.regtest'
      - '--bitcoin.node=bitcoind'
      - '--bitcoind.rpchost=bitcoind:43782'
      - '--bitcoind.rpcuser=polaruser'
      - '--bitcoind.rpcpass=polarpass'
      - '--bitcoind.zmqpubrawblock=tcp://bitcoind:28334'
      - '--bitcoind.zmqpubrawtx=tcp://bitcoind:28335'
      - '--debuglevel=info'
      - '--listen=0.0.0.0:9735'
      - '--rpclisten=0.0.0.0:10009'
      - '--restlisten=0.0.0.0:8080'
      - '--feeurl=http://darkhttpd:80/btc-fee-estimates.json'
      - '--protocol.option-scid-alias'
      - '--protocol.zero-conf'

  ldk-backup-server:
    container_name: ldk-backup-server
    image: synonymsoft/ldk-backup-server:0.0.146
    expose:
      - '3003'
    ports:
      - '3003:3003'
    environment:
      HOST: '0.0.0.0'
      PORT: '3003'
      SECRET_KEY: 'e3e2d2e410569be1f2219e1ef21f188f7ccff1ce721ea2624263d3fe9878f69e'
      PUBLIC_KEY: '0319c4ff23820afec0c79ce3a42031d7fef1dff78b7bdd69b5560684f3e1827675'

  lnurl-server:
    profiles:
      - adhoc
    build:
      context: ./lnurl-server
    restart: unless-stopped
    depends_on:
      - bitcoind
      - lnd
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DOMAIN=http://localhost:${LNURL_SERVER_PORT:-30001}
      - DATABASE_URL=sqlite:///data/lnurl.db
      - BITCOIN_RPC_HOST=bitcoind
      - BITCOIN_RPC_PORT=43782
      - BITCOIN_RPC_USER=polaruser
      - BITCOIN_RPC_PASS=polarpass
      - LND_REST_HOST=lnd
      - LND_REST_PORT=8080
      - LND_MACAROON_PATH=/lnd-certs/data/chain/bitcoin/regtest/admin.macaroon
      - LND_TLS_CERT_PATH=/lnd-certs/tls.cert
    volumes:
      - ./lnurl-server-data:/data
      - ./lnd:/lnd-certs:ro
    ports:
      - '${LNURL_SERVER_PORT:-30001}:3000'


  postgres:
    container_name: postgres
    profiles:
      - homegate
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-test}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-test}"
      POSTGRES_DB: "${POSTGRES_DB:-homegate}"
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  homegate:
    container_name: homegate
    profiles:
      - homegate
    build:
      context: ./homegate
    restart: unless-stopped
    environment:
      HG_DATABASE_URL: "postgres://${POSTGRES_USER:-test}:${POSTGRES_PASSWORD:-test}@postgres:5432/${POSTGRES_DB:-homegate}"
      HG_HOMESERVER_ADMIN_API_URL: "${HG_HOMESERVER_ADMIN_API_URL:-https://admin.homeserver.staging.pubky.app}"
      HG_HOMESERVER_ADMIN_PASSWORD: "${HG_HOMESERVER_ADMIN_PASSWORD:-test}"
      HG_HOMESERVER_PUBKY: "${HG_HOMESERVER_PUBKY:-ufibwbmed6jeq9k4p583go95wofakh9fwpp4k734trq79pd9u1uy}"
      HG_LN_VERIFICATION_ENABLED: "${HG_LN_VERIFICATION_ENABLED:-false}"
      HG_IP_VERIFICATION_ENABLED: "${HG_IP_VERIFICATION_ENABLED:-true}"
      HG_SMS_VERIFICATION_ENABLED: "${HG_SMS_VERIFICATION_ENABLED:-false}"
      HG_PRELUDE_API_KEY: "${HG_PRELUDE_API_KEY:-}"
      HG_MAX_IP_VERIFICATIONS_PER_WEEK: 9999
      HG_MAX_IP_VERIFICATIONS_PER_YEAR: 9999
    ports:
      - '18080:8080'

volumes:
  bitcoin_home:

networks: {}
